---
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  host_build_test_ubuntu:
    name: Host Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ github.job }}-ubuntu-latest
      - uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: "host"
          buildPreset: "host-Debug-WithPackage"
          testPreset: "host"
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hal_st
          path: build/host/hal_st-*-Linux.tar.gz
          if-no-files-found: error
      - name: Upload test logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-logs
          path: build/host/Testing/Temporary/
  host_build_test:
    name: Host Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ github.job }}-${{ matrix.os }}
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: "host-single-Debug"
          buildPreset: "host-single-Debug"
          testPreset: "host-single-Debug"
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - name: Upload test logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-logs
          path: build/host/Testing/Temporary/
  host_build_clang_msvc:
    name: Windows Host Build from Devcontainer
    runs-on: [ubuntu-latest]
    container: ghcr.io/philips-software/amp-devcontainer-cpp:7.2.1@sha256:4d171db10d16f3f8ea17e694f8acce758cd3e5505fffbb62d1dc472afc1604d9 # 7.2.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-winsdk
        with:
          path: /winsdk
          key: cache-winsdk-10.0.26100-14.43.17.13
      - if: ${{ steps.cache-winsdk.outputs.cache-hit != 'true' }}
        run: xwin --accept-license --sdk-version "10.0.26100" --crt-version "14.43.17.13" splat --preserve-ms-arch-notation --include-debug-libs && mv .xwin-cache/splat/ /winsdk
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ github.job }}
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: "Windows"
          buildPreset: "Windows-Release"
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
  embedded_build:
    name: Embedded Build
    runs-on: ubuntu-latest
    needs: [host_build_test_ubuntu]
    strategy:
      matrix:
        configuration: ["RelWithDebInfo"]
        gcc: ["10.3-2021.10"]
        target:
          [
            "stm32wb55",
            "stm32wba52",
            "stm32wba65",
            "stm32g070",
            "stm32g071",
            "stm32g431",
            "stm32f407",
            "stm32f429",
            "stm32f746",
            "stm32f767",
            "stm32h563",
            "stm32h573"
          ]
        include:
          - gcc: "8-2019-q3"
            configuration: "RelWithDebInfo"
            target: "stm32f767"
          - gcc: "9-2020-q2"
            configuration: "RelWithDebInfo"
            target: "stm32f767"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install GNU Arm Embedded Toolchain ${{ matrix.gcc }}
        uses: carlosperate/arm-none-eabi-gcc-action@0725d97b026acf7fc8e22dfd5bee912998879ba8 # v1.12.3
        with:
          release: ${{ matrix.gcc }}
      - run: sudo apt-get update && sudo apt-get install ninja-build xsltproc
      - uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ matrix.gcc }}-${{ matrix.configuration }}-${{ matrix.target }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hal_st
      - run: tar -zxvf hal_st-*.tar.gz
      - run: mkdir install && mv hal_st-*/* install/
      - uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: ${{ matrix.target }}
          buildPreset: ${{ matrix.target }}-${{ matrix.configuration }}
          configurePresetAdditionalArgs: "['-DCMAKE_C_COMPILER_LAUNCHER=ccache', '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache']"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ contains(matrix.target, 'stm32f767') && contains(matrix.gcc, '10.3-2021.10') }}
        with:
          name: hal_st_tester
          path: build/stm32f767/integration_test/tester/RelWithDebInfo/integration_test.tester.bin
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ contains(matrix.target, 'stm32f767') && contains(matrix.gcc, '10.3-2021.10') }}
        with:
          name: hal_st_tested_stm32f767
          path: build/stm32f767/integration_test/tested/RelWithDebInfo/integration_test.tested.bin

  integration_test:
    name: Integration test
    runs-on: ubuntu-latest
    needs: [embedded_build, host_build_test_ubuntu]
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check Postmaster availability
        id: postmaster
        env:
          ENV_POSTMASTER_IP: ${{ vars.ENV_POSTMASTER_IP }}
        run: |
          python - <<'PY'
          import os
          import socket
          import urllib.parse

          url = os.environ.get("ENV_POSTMASTER_IP", "")
          available = "false"

          if not url:
              print("::warning::Skipping integration test because ENV_POSTMASTER_IP is not configured.")
          else:
              parsed = urllib.parse.urlsplit(url if "://" in url else f"//{url}")
              host = parsed.hostname
              port = parsed.port or (443 if parsed.scheme == "https" else 80)

              if not host:
                  print(f"::warning::Skipping integration test because ENV_POSTMASTER_IP={url!r} is not a valid host.")
              else:
                  try:
                      socket.getaddrinfo(host, port, type=socket.SOCK_STREAM)
                      with socket.create_connection((host, port), timeout=10):
                          pass
                  except OSError as exc:
                      print(f"::warning::Skipping integration test because {host}:{port} is unavailable: {exc}")
                  else:
                      available = "true"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"available={available}\n")
          PY
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ steps.postmaster.outputs.available == 'true' }}
        with:
          name: hal_st
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ steps.postmaster.outputs.available == 'true' }}
        with:
          name: hal_st_tester
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ steps.postmaster.outputs.available == 'true' }}
        with:
          name: hal_st_tested_stm32f767
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: ls
      - name: Start flex container
        if: ${{ steps.postmaster.outputs.available == 'true' }}
        env:
          ENV_POSTMASTER_IP: ${{ vars.ENV_POSTMASTER_IP }}
        run: docker run -d --name flex_container -v "$(pwd)":/external -p 1234:1234/tcp -p 1235:1235/tcp ghcr.io/philips-software/amp-postmaster-flex:v0.2.0 "$ENV_POSTMASTER_IP" /external/integration_test.tester.bin
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: docker logs flex_container
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: |
          while true; do
            health="$(docker inspect flex_container | python -c 'import json,sys;print(json.load(sys.stdin)[0]["State"]["Health"]["Status"])')"
            running="$(docker inspect flex_container | python -c 'import json,sys;print(json.load(sys.stdin)[0]["State"]["Running"])')"
            echo "$health"
            if [[ "$health" == "healthy" ]]; then
              break
            fi
            if [[ "$running" != "True" ]]; then
              docker logs flex_container || true
              exit 1
            fi
            sleep 1
          done
        timeout-minutes: 2
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: docker inspect flex_container
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: tar -zxvf hal_st-*-Linux.tar.gz
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: mkdir install
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: mv hal_st-*-Linux/* install/
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: ls install/bin
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: install/bin/integration_test.flasher tcp://localhost:1234/target/echo/programmer integration_test.tested.bin
      - if: ${{ steps.postmaster.outputs.available == 'true' }}
        run: install/bin/integration_test.runner run --feature integration_test/runner/features --report console --target tcp://localhost:1234/target/echo/programmer
      - if: ${{ always() && steps.postmaster.outputs.available == 'true' }}
        run: docker logs flex_container
      - name: Remove flex container
        if: ${{ always() && steps.postmaster.outputs.available == 'true' }}
        run: docker rm -f flex_container
